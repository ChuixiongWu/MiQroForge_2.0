apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: hello-world-
  namespace: miqroforge-v2
  labels:
    app.kubernetes.io/managed-by: miqroforge-v2
spec:
  entrypoint: hello
  serviceAccountName: miqroforge-v2-workflow-sa

  # 镜像仓库前缀通过参数注入，适配不同部署环境：
  #   - 国内私有 Harbor：harbor.example.local/library
  #   - 可访问 Docker Hub：留空
  # 对应 .env 中的 IMAGE_REGISTRY 变量
  arguments:
    parameters:
      - name: image-registry
        value: "harbor.era.local/library"   # 本集群默认值，按需修改

  templates:
    - name: hello
      steps:
        - - name: step1-hello
            template: print-message
            arguments:
              parameters:
                - name: message
                  value: "Hello from MiQroForge 2.0!"
        - - name: step2-info
            template: print-message
            arguments:
              parameters:
                - name: message
                  value: "Phase 1 environment is ready. Quantum + AI computing platform initialized."

    - name: print-message
      inputs:
        parameters:
          - name: message
      container:
        image: "{{workflow.parameters.image-registry}}/busybox:latest"
        command: [sh, -c]
        args:
          - |
            echo '========================================'
            echo '  {{inputs.parameters.message}}'
            echo '========================================'
            date
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
