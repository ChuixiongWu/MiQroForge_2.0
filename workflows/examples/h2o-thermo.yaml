# ─────────────────────────────────────────────────────────────────────────
# H2O 热力学工作流 — 骨架测试
#
# 用 busybox 空壳容器模拟 Gaussian opt → freq → thermo 的完整数据链路。
# 所有数据通过 Argo Parameter 传递（集群尚未配 artifact repository）。
#
# 三步 DAG：
#   geo-opt ──▶ freq ──▶ thermo-extract
#
# 设计说明：
#   频率计算在生产中可以作为 geo-opt 的可选参数（Gaussian opt freq 是一个 job）。
#   此处拆成 3 步是为了更充分地验证 Argo 数据链路。
# ─────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: h2o-thermo-
  namespace: miqroforge-v2
  labels:
    app.kubernetes.io/managed-by: miqroforge-v2
    miqroforge.io/workflow-type: skeleton-test
spec:
  entrypoint: h2o-thermochemistry
  serviceAccountName: miqroforge-v2-workflow-sa

  arguments:
    parameters:
      - name: image-registry
        value: "harbor.era.local/library"
      # ── On-Board 参数（模拟用户在节点面板填写的值）──
      - name: functional
        value: "B3LYP"
      - name: basis-set
        value: "6-31G*"
      - name: charge
        value: "0"
      - name: multiplicity
        value: "1"
      - name: temperature
        value: "298.15"

  templates:
    # ═══════════════════════════════════════════════════════════════════════
    # 入口：DAG 编排
    # ═══════════════════════════════════════════════════════════════════════
    - name: h2o-thermochemistry
      dag:
        tasks:
          - name: geo-opt
            template: stub-geo-opt
            arguments:
              parameters:
                - name: functional
                  value: "{{workflow.parameters.functional}}"
                - name: basis-set
                  value: "{{workflow.parameters.basis-set}}"
                - name: charge
                  value: "{{workflow.parameters.charge}}"
                - name: multiplicity
                  value: "{{workflow.parameters.multiplicity}}"

          - name: freq
            template: stub-freq
            dependencies: [geo-opt]
            arguments:
              parameters:
                - name: checkpoint-stub
                  value: "{{tasks.geo-opt.outputs.parameters.checkpoint-stub}}"
                - name: temperature
                  value: "{{workflow.parameters.temperature}}"

          - name: thermo-extract
            template: stub-thermo-extract
            dependencies: [freq]
            arguments:
              parameters:
                - name: gibbs-ha
                  value: "{{tasks.freq.outputs.parameters.gibbs-ha}}"
                - name: enthalpy-ha
                  value: "{{tasks.freq.outputs.parameters.enthalpy-ha}}"
                - name: is-minimum
                  value: "{{tasks.freq.outputs.parameters.is-minimum}}"

    # ═══════════════════════════════════════════════════════════════════════
    # Step 1: 几何构型优化（空壳）
    # ═══════════════════════════════════════════════════════════════════════
    - name: stub-geo-opt
      inputs:
        parameters:
          - name: functional
          - name: basis-set
          - name: charge
          - name: multiplicity
      outputs:
        parameters:
          - name: total-energy
            valueFrom:
              path: /mf/output/total_energy
          - name: converged
            valueFrom:
              path: /mf/output/converged
          - name: checkpoint-stub
            valueFrom:
              path: /mf/output/checkpoint_stub
      container:
        image: "{{workflow.parameters.image-registry}}/busybox:latest"
        command: [sh, -c]
        args:
          - |
            echo "═══ MiQroForge Stub: geo-opt ═══"
            echo "Method: {{inputs.parameters.functional}}/{{inputs.parameters.basis-set}}"
            echo "System: H2O, charge={{inputs.parameters.charge}}, mult={{inputs.parameters.multiplicity}}"
            echo ""

            mkdir -p /mf/output

            echo "Simulating geometry optimization..."
            echo "  Step 1/5: E = -76.410235 Ha"
            echo "  Step 2/5: E = -76.428103 Ha"
            echo "  Step 3/5: E = -76.433512 Ha"
            echo "  Step 4/5: E = -76.433998 Ha"
            echo "  Step 5/5: E = -76.434000 Ha  (converged)"
            echo ""

            printf '%s' '-76.434000' > /mf/output/total_energy
            printf '%s' 'true'       > /mf/output/converged
            printf '%s' 'CHECKPOINT:H2O:OPT:B3LYP:631Gd:CONVERGED' > /mf/output/checkpoint_stub

            echo "geo-opt complete. Total energy: -76.434000 Ha"
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"

    # ═══════════════════════════════════════════════════════════════════════
    # Step 2: 频率计算（空壳）
    # ═══════════════════════════════════════════════════════════════════════
    - name: stub-freq
      inputs:
        parameters:
          - name: checkpoint-stub
          - name: temperature
      outputs:
        parameters:
          - name: n-imaginary
            valueFrom:
              path: /mf/output/n_imaginary
          - name: is-minimum
            valueFrom:
              path: /mf/output/is_minimum
          - name: zpe
            valueFrom:
              path: /mf/output/zpe
          - name: gibbs-ha
            valueFrom:
              path: /mf/output/gibbs_ha
          - name: enthalpy-ha
            valueFrom:
              path: /mf/output/enthalpy_ha
      container:
        image: "{{workflow.parameters.image-registry}}/busybox:latest"
        command: [sh, -c]
        args:
          - |
            echo "═══ MiQroForge Stub: freq ═══"
            echo "Checkpoint: {{inputs.parameters.checkpoint-stub}}"
            echo "Temperature: {{inputs.parameters.temperature}} K"
            echo ""

            mkdir -p /mf/output

            echo "Simulating frequency calculation..."
            echo "  Freq 1: 1648.5 cm-1 (bend)"
            echo "  Freq 2: 3832.2 cm-1 (sym stretch)"
            echo "  Freq 3: 3942.8 cm-1 (asym stretch)"
            echo "  No imaginary frequencies → true minimum"
            echo ""
            echo "Thermochemistry at {{inputs.parameters.temperature}} K:"
            echo "  ZPE          =  0.021375 Ha"
            echo "  Enthalpy     = -76.408901 Ha"
            echo "  Gibbs Energy = -76.432456 Ha"
            echo ""

            printf '%s' '0'           > /mf/output/n_imaginary
            printf '%s' 'true'        > /mf/output/is_minimum
            printf '%s' '0.021375'    > /mf/output/zpe
            printf '%s' '-76.432456'  > /mf/output/gibbs_ha
            printf '%s' '-76.408901'  > /mf/output/enthalpy_ha

            echo "freq complete."
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"

    # ═══════════════════════════════════════════════════════════════════════
    # Step 3: 热力学数据提取 + 单位转换（空壳轻量节点）
    # ═══════════════════════════════════════════════════════════════════════
    - name: stub-thermo-extract
      inputs:
        parameters:
          - name: gibbs-ha
          - name: enthalpy-ha
          - name: is-minimum
      outputs:
        parameters:
          - name: gibbs-ev
            valueFrom:
              path: /mf/output/gibbs_ev
          - name: enthalpy-ev
            valueFrom:
              path: /mf/output/enthalpy_ev
          - name: summary
            valueFrom:
              path: /mf/output/summary
      container:
        image: "{{workflow.parameters.image-registry}}/busybox:latest"
        command: [sh, -c]
        args:
          - |
            echo "═══ MiQroForge Stub: thermo-extract ═══"
            echo "Input: G={{inputs.parameters.gibbs-ha}} Ha, H={{inputs.parameters.enthalpy-ha}} Ha"
            echo "Is minimum: {{inputs.parameters.is-minimum}}"
            echo ""

            mkdir -p /mf/output

            # 单位转换: 1 Ha = 27.211386 eV（用 awk 做浮点运算）
            HA_TO_EV=27.211386

            G_EV=$(echo "{{inputs.parameters.gibbs-ha}}" | awk "{printf \"%.6f\", \$1 * $HA_TO_EV}")
            H_EV=$(echo "{{inputs.parameters.enthalpy-ha}}" | awk "{printf \"%.6f\", \$1 * $HA_TO_EV}")

            printf '%s' "$G_EV" > /mf/output/gibbs_ev
            printf '%s' "$H_EV" > /mf/output/enthalpy_ev

            printf 'H2O B3LYP/6-31G* | G = %s eV | H = %s eV | minimum: %s' \
              "$G_EV" "$H_EV" "{{inputs.parameters.is-minimum}}" > /mf/output/summary

            echo "Results:"
            echo "  Gibbs Free Energy = $G_EV eV"
            echo "  Enthalpy          = $H_EV eV"
            echo ""
            echo "thermo-extract complete."
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
