# ===========================================================================
# Shared Parameter Table — canonical name → software-native keyword mapping
#
# 当节点 OnBoardInput 设置 _shared_param 时，此表是参数的唯一事实来源：
# - kind / display_name / description / allow_other → 从 categories 元数据推导
# - allowed_values → 从条目列表按 software 过滤推导
# - 编译时翻译 → 从条目的软件映射推导
#
# 节点 nodespec 中只需写 name + default + _shared_param，无需重复声明其他字段。
# ===========================================================================
version: "2.0"

# ── category 元数据 ──────────────────────────────────────────────────────
# 节点的 _shared_param 引用此表时，以下字段自动填充到 OnBoardInput。
categories:
  functionals:
    kind: enum
    display_name: "DFT Functional"
    description: "DFT 泛函名称。下拉选择常用泛函，或手动输入任意泛函。"
    allow_other: true
  basis_sets:
    kind: enum
    display_name: "Basis Set"
    description: "基组名称。下拉选择常用基组，或手动输入任意基组。"
    allow_other: true
  dispersions:
    kind: enum
    display_name: "Dispersion Correction"
    description: "色散校正方法。选择 none 表示不使用色散校正。"
    allow_other: false

# ── DFT 泛函（15 个）────────────────────────────────────────────────────
