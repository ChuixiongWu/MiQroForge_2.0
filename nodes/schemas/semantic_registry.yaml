version: "1.0"
types:
  geometry-input:
    display_name: Geometry Input
    description: "Reads or provides molecular geometry as input for downstream calculations."
    domain: computational-chemistry
  geometry-optimization:
    display_name: Geometry Optimization
    description: "Structural relaxation to find the minimum-energy geometry."
    domain: computational-chemistry
  frequency-analysis:
    display_name: Frequency Analysis
    description: "Harmonic vibrational frequency calculation at a stationary point."
    domain: computational-chemistry
  single-point-energy:
    display_name: "Single Energy [mol]"
    description: "Electronic energy at a fixed molecular geometry. Supports HF, DFT, MP2, CCSD, CASCI, TD-DFT."
    domain: computational-chemistry
  crystal-single-point-energy:
    display_name: "Single Energy [crystal]"
    description: "Periodic DFT energy for crystal/slab/bulk with PBC. Plane-wave or GPW methods."
    domain: computational-chemistry
  cell-optimization:
    display_name: Cell Optimization
    description: "Simultaneous optimization of atomic positions and unit cell parameters (volume, shape)."
    domain: computational-chemistry
