# ===========================================================================
# test-thermo-extractor — TEST/MOCK node for pipeline testing
#
# This is a test node using busybox. NOT for production.
# Uses mock shell scripts that write predetermined values.
# ===========================================================================

metadata:
  name: test-thermo-extractor
  version: 1.0.0
  display_name: '[TEST] Thermochemistry Extractor'
  description: '[TEST/MOCK] Extracts and converts thermochemistry data from frequency
    analysis. Mock version for pipeline testing.'
  node_type: compute
  category: utility
  tags:
    software: test
    version: '0.0'
    method:
    - extraction
    - unit-conversion
    domain:
    - molecular
    - thermochemistry
    capabilities:
    - data-extraction
    - unit-conversion
    keywords:
    - test
    - mock
    - thermo
    - gibbs
    - enthalpy
    - extraction
    - postprocessing
  author: MiQroForge Team
  semantic_type: frequency-analysis
  base_image_ref: test-busybox
stream_inputs:
- name: thermo_data_in
  display_name: Thermochemistry Data
  io_type:
    category: software_data_package
    ecosystem: gaussian
    data_type: thermo-data
    file_patterns:
    - thermo.json
  required: true
  description: Thermochemistry data from upstream frequency analysis.
stream_outputs:
- name: gibbs_ev
  display_name: Gibbs Energy (eV)
  io_type:
    category: physical_quantity
    unit: eV
    shape: scalar
  description: Gibbs free energy converted to eV.
- name: summary
  display_name: Summary Report
  io_type:
    category: report_object
    format: json
    content_schema: '{"gibbs_ev": "float", "enthalpy_ev": "float", "is_minimum": "bool"}'
    description: JSON summary of extracted thermochemistry data.
  description: Machine-readable summary of thermochemistry results.
onboard_inputs:
- name: energy_unit
  display_name: Energy Unit
  kind: enum
  default: Ha
  required: true
  allowed_values:
  - Ha
  - eV
  - kcal/mol
  - kJ/mol
onboard_outputs:
- name: gibbs_converted
  display_name: Gibbs (converted)
  kind: float
  description: Gibbs energy in the requested unit.
- name: is_valid_minimum
  display_name: Valid Minimum
  kind: boolean
  description: Whether structure is a valid minimum for downstream use.
resources:
  cpu_cores: 1
  mem_gb: 0.25
  estimated_walltime_hours: 0.005
  gpu_count: 0
execution:
  profile_mount_path: /mf/profile
  input_mount_path: /mf/input
  output_mount_path: /mf/output
  entrypoint_script: run.sh
semantic_identity: '[TEST] Post-processing extraction and unit conversion of thermochemistry
  results'
distinguishing_ports:
- thermo_data_in
- gibbs_ev
rag_summary: ''
