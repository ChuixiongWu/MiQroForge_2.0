# ===========================================================================
# test-gaussian-freq — TEST/MOCK node for pipeline testing
#
# This is a test node using busybox. NOT for production.
# Uses mock shell scripts that write predetermined values.
# ===========================================================================

metadata:
  name: test-gaussian-freq
  version: 1.0.0
  display_name: '[TEST] Gaussian Frequency Analysis'
  description: '[TEST/MOCK] Performs harmonic frequency analysis using Gaussian. Mock
    version for pipeline testing.'
  node_type: compute
  category: utility
  tags:
    software: test
    version: '0.0'
    method:
    - DFT
    - harmonic-frequencies
    domain:
    - molecular
    capabilities:
    - frequency-analysis
    - thermochemistry
    keywords:
    - test
    - mock
    - freq
    - frequency
    - vibrational
    - thermochemistry
  author: MiQroForge Team
  semantic_type: frequency-analysis
  base_image_ref: test-busybox
stream_inputs:
- name: checkpoint_in
  display_name: Input Checkpoint
  io_type:
    category: software_data_package
    ecosystem: gaussian
    data_type: checkpoint
    file_patterns:
    - '*.chk'
  required: true
  description: Gaussian checkpoint from a preceding geometry optimization.
stream_outputs:
- name: thermo_data
  display_name: Thermochemistry Data
  io_type:
    category: software_data_package
    ecosystem: gaussian
    data_type: thermo-data
    file_patterns:
    - thermo.json
    estimated_size_mb: 0.1
  description: Extracted thermochemistry data (ZPE, Gibbs, enthalpy).
- name: zpe
  display_name: Zero-Point Energy
  io_type:
    category: physical_quantity
    unit: Ha
    shape: scalar
  description: Zero-point vibrational energy.
onboard_inputs:
- name: temperature
  display_name: Temperature
  kind: float
  default: 298.15
  required: true
  unit: K
  min_value: 0.0
onboard_outputs:
- name: n_imaginary
  display_name: Imaginary Frequencies
  kind: integer
  description: Number of imaginary frequencies.
- name: gibbs_energy
  display_name: Gibbs Free Energy
  kind: float
  unit: Ha
  description: Gibbs free energy at specified temperature.
- name: enthalpy
  display_name: Enthalpy
  kind: float
  unit: Ha
  description: Enthalpy at specified temperature.
- name: is_true_minimum
  display_name: Is True Minimum
  kind: boolean
  description: True if no imaginary frequencies found (true minimum on PES).
  quality_gate: true
  gate_default: must_pass
  gate_description: "Structure must be a true minimum (no imaginary frequencies)."
resources:
  cpu_cores: 1
  memory_gb: 0.5
  estimated_walltime_hours: 0.01
  gpu_count: 0
execution:
  profile_mount_path: /mf/profile
  input_mount_path: /mf/input
  output_mount_path: /mf/output
  entrypoint_script: run.sh
semantic_identity: '[TEST] Harmonic frequency analysis and thermochemistry using Gaussian
  software'
distinguishing_ports:
- thermo_data
rag_summary: ''
