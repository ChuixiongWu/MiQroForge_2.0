# ===========================================================================
# test-diverging-geo-opt — TEST node that always reports non-convergence
#
# Deliberately writes converged=false to its quality gate output.
# Used to verify that Argo `when` conditions correctly block downstream
# tasks when a must_pass gate fails.
# ===========================================================================

metadata:
  name: test-diverging-geo-opt
  version: 1.0.0
  display_name: '[TEST] Diverging Geometry Optimization'
  description: >
    [TEST/MOCK] Simulates a geometry optimization that fails to converge.
    Always writes converged=false to the quality gate output, which should
    cause all downstream nodes with must_pass policy to be skipped by Argo.
  node_type: compute
  category: utility
  tags:
    software: test
    version: '0.0'
    method:
      - DFT
      - geometry-optimization
    domain:
      - molecular
    capabilities:
      - geometry-optimization
    keywords:
      - test
      - mock
      - diverging
      - non-convergence
      - quality-gate
  author: MiQroForge Team
  semantic_type: geometry-optimization
  base_image_ref: test-busybox

stream_inputs: []

stream_outputs:
  - name: optimized_checkpoint
    display_name: Checkpoint (Partial)
    io_type:
      category: software_data_package
      ecosystem: gaussian
      data_type: checkpoint
      file_patterns:
        - '*.chk'
      estimated_size_mb: 50.0
    description: >
      Gaussian checkpoint file from a non-converged run.
      Downstream nodes are blocked by the quality gate and should not use this.

  - name: total_energy
    display_name: Total Energy (last step)
    io_type:
      category: physical_quantity
      unit: Ha
      shape: scalar
    description: Electronic energy at the last (non-converged) geometry step.

onboard_inputs:
  - name: functional
    display_name: DFT Functional
    kind: string
    default: B3LYP
    required: true

  - name: basis_set
    display_name: Basis Set
    kind: string
    default: 6-31G*
    required: true

  - name: charge
    display_name: Molecular Charge
    kind: integer
    default: 0
    required: true

  - name: multiplicity
    display_name: Spin Multiplicity
    kind: integer
    default: 1
    required: true
    min_value: 1

onboard_outputs:
  - name: final_energy
    display_name: Final Energy (last step)
    kind: float
    unit: Ha
    description: Energy at the last non-converged geometry.

  - name: n_iterations
    display_name: Optimization Steps Taken
    kind: integer
    description: Number of steps before giving up.

  - name: converged
    display_name: Convergence Flag
    kind: boolean
    description: Always false — this node simulates a diverging optimization.
    quality_gate: true
    gate_default: must_pass
    gate_description: "Geometry optimization did not converge. Downstream frequency analysis cannot proceed."

resources:
  cpu_cores: 1
  mem_gb: 0.5
  estimated_walltime_hours: 0.01
  gpu_count: 0

execution:
  profile_mount_path: /mf/profile
  input_mount_path: /mf/input
  output_mount_path: /mf/output
  entrypoint_script: run.sh

semantic_identity: '[TEST] Diverging geometry optimization — always reports non-convergence to test quality gate blocking'

distinguishing_ports:
  - optimized_checkpoint

rag_summary: ''
