# ===========================================================================
# test-gaussian-geo-opt — TEST/MOCK node for pipeline testing
#
# This is a test node using busybox. NOT for production.
# Uses mock shell scripts that write predetermined values.
# ===========================================================================

metadata:
  name: test-gaussian-geo-opt
  version: 1.0.0
  display_name: '[TEST] Gaussian Geometry Optimization'
  description: '[TEST/MOCK] Performs DFT geometry optimization using Gaussian. Mock
    version for pipeline testing.'
  node_type: compute
  category: utility
  tags:
    software: test
    version: '0.0'
    method:
    - DFT
    - B3LYP
    domain:
    - molecular
    capabilities:
    - geometry-optimization
    keywords:
    - test
    - mock
    - geo-opt
    - optimization
    - gaussian
  author: MiQroForge Team
  semantic_type: geometry-optimization
  base_image_ref: test-busybox
stream_inputs: []
stream_outputs:
- name: optimized_checkpoint
  display_name: Optimized Checkpoint
  io_type:
    category: software_data_package
    ecosystem: gaussian
    data_type: checkpoint
    file_patterns:
    - '*.chk'
    estimated_size_mb: 50.0
  description: Gaussian checkpoint file containing optimized geometry and wavefunction.
- name: total_energy
  display_name: Total Energy
  io_type:
    category: physical_quantity
    unit: Ha
    shape: scalar
  description: Total electronic energy at optimized geometry.
onboard_inputs:
- name: functional
  display_name: DFT Functional
  kind: string
  default: B3LYP
  required: true
- name: basis_set
  display_name: Basis Set
  kind: string
  default: 6-31G*
  required: true
- name: charge
  display_name: Molecular Charge
  kind: integer
  default: 0
  required: true
- name: multiplicity
  display_name: Spin Multiplicity
  kind: integer
  default: 1
  required: true
  min_value: 1
onboard_outputs:
- name: final_energy
  display_name: Final Energy
  kind: float
  unit: Ha
  description: Total energy at converged geometry.
- name: n_iterations
  display_name: Optimization Steps
  kind: integer
  description: Number of optimization iterations.
- name: converged
  display_name: Convergence Flag
  kind: boolean
  description: Whether the geometry optimization converged successfully.
  quality_gate: true
  gate_default: must_pass
  gate_description: "Geometry optimization must converge before frequency analysis."
resources:
  cpu_cores: 1
  memory_gb: 0.5
  estimated_walltime_hours: 0.01
  gpu_count: 0
execution:
  profile_mount_path: /mf/profile
  input_mount_path: /mf/input
  output_mount_path: /mf/output
  entrypoint_script: run.sh
semantic_identity: '[TEST] DFT geometry optimization using Gaussian software'
distinguishing_ports:
- optimized_checkpoint
rag_summary: ''
