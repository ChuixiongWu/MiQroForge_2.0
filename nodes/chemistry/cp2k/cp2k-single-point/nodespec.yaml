# ===========================================================================
# cp2k-single-point — CP2K Single-Point Energy (Periodic DFT)
#
# 使用 CP2K 进行周期性体系单点能量计算（GPW 方法）。
# ===========================================================================

metadata:
  name: cp2k-single-point
  version: 1.0.0
  display_name: CP2K Single-Point Energy
  description: >
    Performs a single-point energy calculation for periodic systems using
    CP2K (GPW/GAPW method). Supports PBC, plane-wave cutoff, and electronic
    smearing for metals. Requires cell parameters for the simulation box.
  node_type: compute
  category: chemistry
  author: MiQroForge Team
  semantic_type: single-point-energy
  base_image_ref: cp2k-2025.2
  tags:
    software: cp2k
    version: "2025.2"
    method:
      - DFT
      - GPW
      - periodic
      - single-point
    domain:
      - periodic
      - solid-state
      - surface
    capabilities:
      - single-point-energy
      - periodic-dft
    keywords:
      - cp2k
      - periodic
      - solid-state
      - slab
      - bulk

stream_inputs:
  - name: xyz_geometry
    display_name: Input Geometry (XYZ)
    io_type:
      category: physical_quantity
      unit: Ang
      shape: array
    required: true
    description: >
      Atomic positions in XYZ format (Angstrom).
      Cell parameters are provided via the cell_abc onboard input.

stream_outputs:
  - name: total_energy
    display_name: Total Energy
    io_type:
      category: physical_quantity
      unit: Ha
    description: Total electronic energy (FORCE_EVAL result).

  - name: cell_parameters
    display_name: Cell Parameters
    io_type:
      category: physical_quantity
      unit: Ang
      shape: array
    description: Cell vectors (a, b, c, alpha, beta, gamma) as space-separated values.

onboard_inputs:
  - name: charge
    display_name: System Charge
    kind: integer
    default: 0

  - name: multiplicity
    display_name: Spin Multiplicity
    kind: integer
    default: 1
    min_value: 1

  - name: cell_abc
    display_name: Cell Parameters (a b c alpha beta gamma)
    kind: string
    default: "5.43 5.43 5.43 90 90 90"
    description: >
      Unit cell parameters: a b c (Angstrom) alpha beta gamma (degrees).
      Space-separated. For cubic: "5.43 5.43 5.43 90 90 90".

  - name: xc_functional
    display_name: Exchange-Correlation Functional
    kind: enum
    default: PBE
    allowed_values:
      - PBE
      - PBE0
      - B3LYP
      - LDA
      - BLYP
      - TPSS
      - SCAN
      - HSE06

  - name: basis_set
    display_name: Basis Set
    kind: string
    default: DZVP-MOLOPT-SR-GTH
    description: "CP2K MOLOPT basis set name, e.g. DZVP-MOLOPT-SR-GTH, TZVP-MOLOPT-GTH"

  - name: cutoff
    display_name: Plane-Wave Cutoff (Ry)
    kind: integer
    default: 400
    min_value: 100
    max_value: 2000
    unit: Ry
    description: "PW cutoff in Rydberg. 300-600 typical for MOLOPT basis."

  - name: rel_cutoff
    display_name: Relative Cutoff (Ry)
    kind: integer
    default: 50
    min_value: 20
    max_value: 200

  - name: max_scf
    display_name: Max SCF Cycles
    kind: integer
    default: 50
    min_value: 5
    max_value: 500

  - name: eps_scf
    display_name: SCF Convergence Threshold
    kind: float
    default: 1.0e-6
    description: "Energy convergence criterion for SCF (Ha)."

  - name: smearing
    display_name: Electronic Smearing
    kind: enum
    default: "fermi_dirac"
    allowed_values:
      - "none"
      - "fermi_dirac"

  - name: electronic_temperature
    display_name: Electronic Temperature (K)
    kind: integer
    default: 300
    min_value: 0
    max_value: 10000
    description: "Fermi-Dirac smearing temperature. 0 = no smearing."

onboard_outputs:
  - name: scf_energy
    display_name: Final Energy (Ha)
    kind: float
    unit: Ha

  - name: scf_converged
    display_name: SCF Converged
    kind: boolean
    description: Whether SCF converged.
    quality_gate: true
    gate_default: must_pass
    gate_description: "SCF must converge."

resources:
  cpu_cores: 4
  memory_gb: 16.0
  estimated_walltime_hours: 1.0
  scratch_disk_gb: 20.0
  parallel_tasks: 4
  resource_bindings:
    - cpu_cores
    - parallel_tasks

execution: {}

semantic_identity: >-
  Single-point energy calculation for periodic systems using CP2K.
  Supports PBC, plane-wave DFT, and electronic smearing.

distinguishing_ports:
  - total_energy
  - cell_parameters

rag_summary: ""
