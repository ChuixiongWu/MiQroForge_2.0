# ===========================================================================
# cp2k-geo-opt — CP2K Geometry Optimization (Fixed Cell)
#
# 使用 CP2K 进行几何结构优化（固定晶胞，优化原子位置）。
# ===========================================================================

metadata:
  name: cp2k-geo-opt
  version: 1.0.0
  display_name: CP2K Geometry Optimization
  description: >
    Geometry optimization of atomic positions at fixed cell using CP2K.
    Supports BFGS, CG, and LBFGS optimization algorithms.
    For cell+atom optimization, use cp2k-cell-opt.
  node_type: compute
  category: chemistry
  author: MiQroForge Team
  semantic_type: geometry-optimization
  base_image_ref: cp2k-2025.2
  tags:
    software: cp2k
    version: "2025.2"
    method:
      - DFT
      - GPW
      - periodic
      - geometry-optimization
    domain:
      - periodic
      - solid-state
    capabilities:
      - geometry-optimization
      - periodic-dft
    keywords:
      - cp2k
      - optimization
      - periodic

stream_inputs:
  - name: xyz_geometry
    display_name: Input Geometry (XYZ)
    io_type:
      category: physical_quantity
      unit: Ang
      shape: array
    required: true
    description: >
      Atomic positions in XYZ format (Angstrom).

stream_outputs:
  - name: optimized_xyz
    display_name: Optimized Geometry
    io_type:
      category: physical_quantity
      unit: Ang
      shape: array
    description: Optimized atomic positions in XYZ format.

  - name: total_energy
    display_name: Final Energy
    io_type:
      category: physical_quantity
      unit: Ha
    description: Total energy at the optimized geometry.

  - name: cell_parameters
    display_name: Cell Parameters
    io_type:
      category: physical_quantity
      unit: Ang
      shape: array
    description: Cell vectors (unchanged from input).

onboard_inputs:
  - name: charge
    display_name: System Charge
    kind: integer
    default: 0

  - name: multiplicity
    display_name: Spin Multiplicity
    kind: integer
    default: 1
    min_value: 1

  - name: cell_abc
    display_name: Cell Parameters (a b c alpha beta gamma)
    kind: string
    default: "5.43 5.43 5.43 90 90 90"
    description: "Unit cell: a b c (Ang) alpha beta gamma (deg)."

  - name: xc_functional
    display_name: Exchange-Correlation Functional
    kind: enum
    default: PBE
    allowed_values:
      - PBE
      - PBE0
      - B3LYP
      - LDA
      - BLYP
      - TPSS
      - SCAN
      - HSE06

  - name: basis_set
    display_name: Basis Set
    kind: string
    default: DZVP-MOLOPT-SR-GTH

  - name: cutoff
    display_name: Plane-Wave Cutoff (Ry)
    kind: integer
    default: 400
    min_value: 100
    max_value: 2000
    unit: Ry

  - name: rel_cutoff
    display_name: Relative Cutoff (Ry)
    kind: integer
    default: 50
    min_value: 20
    max_value: 200

  - name: max_scf
    display_name: Max SCF Cycles
    kind: integer
    default: 50
    min_value: 5
    max_value: 500

  - name: eps_scf
    display_name: SCF Convergence
    kind: float
    default: 1.0e-6

  - name: smearing
    display_name: Electronic Smearing
    kind: enum
    default: "fermi_dirac"
    allowed_values:
      - "none"
      - "fermi_dirac"

  - name: electronic_temperature
    display_name: Electronic Temperature (K)
    kind: integer
    default: 300
    min_value: 0
    max_value: 10000

  - name: opt_algorithm
    display_name: Optimization Algorithm
    kind: enum
    default: BFGS
    allowed_values:
      - BFGS
      - CG
      - LBFGS

  - name: max_opt_iter
    display_name: Max Optimization Steps
    kind: integer
    default: 200
    min_value: 10
    max_value: 2000

  - name: opt_max_force
    display_name: Force Convergence (Ha/bohr)
    kind: float
    default: 4.5e-4
    description: "Maximum force threshold for convergence."

onboard_outputs:
  - name: final_energy
    display_name: Final Energy (Ha)
    kind: float
    unit: Ha

  - name: opt_cycles
    display_name: Optimization Cycles
    kind: integer

  - name: opt_converged
    display_name: Optimization Converged
    kind: boolean
    quality_gate: true
    gate_default: must_pass
    gate_description: "Geometry optimization must converge."

resources:
  cpu_cores: 4
  mem_gb: 16.0
  estimated_walltime_hours: 2.0
  scratch_disk_gb: 20.0
  parallel_tasks: 4
  parametrize:
    - cpu_cores
    - parallel_tasks
    - estimated_walltime_hours
    - scratch_disk_gb

execution: {}

semantic_identity: >-
  Geometry optimization of atomic positions at fixed cell using CP2K.
  For periodic systems (bulk, slabs).

distinguishing_ports:
  - optimized_xyz
  - total_energy

rag_summary: ""
