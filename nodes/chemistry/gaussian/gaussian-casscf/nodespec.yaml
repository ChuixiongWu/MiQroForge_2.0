# gaussian-casscf — Gaussian 16 CASSCF Single-Point
metadata:
  name: gaussian-casscf
  version: 1.0.0
  display_name: Gaussian CASSCF Single-Point
  description: >
    CASSCF single-point energy calculation using Gaussian 16.
    Complete Active Space Self-Consistent Field for multireference problems.
    Produces formatted checkpoint file and total energy.
    Note: CASSCF is memory-intensive; adjust mem_gb for larger active spaces.
  node_type: compute
  category: chemistry
  author: MiQroForge Team
  semantic_type: single-point-energy
  base_image_ref: g16
  tags:
    software: gaussian
    version: "16"
    method:
      - CASSCF
      - single-point
      - multireference
    domain:
      - molecular
    capabilities:
      - single-point-energy
    keywords:
      - gaussian
      - casscf
      - multireference
      - active-space

stream_inputs:
  - name: xyz_geometry
    display_name: Input Geometry (XYZ)
    io_type:
      category: physical_quantity
      unit: Ang
      shape: array
    required: true
    description: Molecular geometry in standard XYZ format (Angstrom).

stream_outputs:
  - name: fchk_file
    display_name: Formatted Checkpoint File
    io_type:
      category: software_data_package
      ecosystem: gaussian
      data_type: formatted-checkpoint
    description: Gaussian formatted checkpoint file (.fchk).

  - name: total_energy
    display_name: Total Energy
    io_type:
      category: physical_quantity
      unit: Ha
    description: Total CASSCF electronic energy.

onboard_inputs:
  - name: charge
    display_name: Molecular Charge
    kind: integer
    default: 0

  - name: multiplicity
    display_name: Spin Multiplicity
    kind: integer
    default: 1
    min_value: 1

  - name: basis_set
    display_name: Basis Set
    kind: string
    default: "6-31G*"
    _shared_param: basis_sets

  - name: population
    display_name: Population Analysis
    kind: enum
    default: Full
    allowed_values:
      - Full
      - None
      - Minimal

  - name: active_electrons
    display_name: Active Electrons
    kind: integer
    default: 2
    min_value: 0
    description: "Number of active electrons"

  - name: active_orbitals
    display_name: Active Orbitals
    kind: integer
    default: 2
    min_value: 1
    description: "Number of active orbitals"

  - name: reference
    display_name: SCF Reference
    kind: enum
    default: rhf
    allowed_values:
      - rhf
      - uhf
      - rohf
    description: "SCF reference"

onboard_outputs:
  - name: scf_energy
    display_name: SCF Energy (Ha)
    kind: float
    unit: Ha

  - name: scf_converged
    display_name: SCF Converged
    kind: boolean
    quality_gate: true
    gate_default: must_pass
    gate_description: "SCF must converge."

resources:
  cpu_cores: 4
  mem_gb: 32.0
  mem_overhead: 4.0
  estimated_walltime_hours: 1.0
  scratch_disk_gb: 10.0
  parametrize:
    - cpu_cores
    - mem_gb
    - estimated_walltime_hours

execution:
  environment:
    GAUSS_SCRDIR: "/tmp"

semantic_identity: >-
  CASSCF single-point energy calculation using Gaussian 16.

distinguishing_ports:
  - fchk_file
  - total_energy

rag_summary: ""
