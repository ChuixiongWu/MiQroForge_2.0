# gaussian-tddft — Gaussian 16 TD-DFT Excited-State
metadata:
  name: gaussian-tddft
  version: 1.0.0
  display_name: Gaussian TD-DFT Excited-State
  description: >
    TD-DFT excited-state calculation using Gaussian 16.
    Computes vertical excitation energies and oscillator strengths.
    Produces formatted checkpoint file, total energy, and excitation data.
  node_type: compute
  category: chemistry
  author: MiQroForge Team
  semantic_type: single-point-energy
  base_image_ref: g16
  tags:
    software: gaussian
    version: "16"
    method:
      - TD-DFT
      - excited-state
      - single-point
    domain:
      - molecular
    capabilities:
      - single-point-energy
    keywords:
      - gaussian
      - tddft
      - excited-state
      - absorption

stream_inputs:
  - name: xyz_geometry
    display_name: Input Geometry (XYZ)
    io_type:
      category: physical_quantity
      unit: Ang
      shape: array
    required: true
    description: Molecular geometry in standard XYZ format (Angstrom).

stream_outputs:
  - name: fchk_file
    display_name: Formatted Checkpoint File
    io_type:
      category: software_data_package
      ecosystem: gaussian
      data_type: formatted-checkpoint
    description: Gaussian formatted checkpoint file (.fchk).

  - name: total_energy
    display_name: Total Energy
    io_type:
      category: physical_quantity
      unit: Ha
    description: Total ground-state electronic energy.

  - name: excitation_energies
    display_name: Excitation Energies
    io_type:
      category: report_object
      format: json
    description: List of vertical excitation energies in eV.

onboard_inputs:
  - name: charge
    display_name: Molecular Charge
    kind: integer
    default: 0

  - name: multiplicity
    display_name: Spin Multiplicity
    kind: integer
    default: 1
    min_value: 1

  - name: functional
    display_name: Exchange-Correlation Functional
    kind: enum
    default: B3LYP
    allowed_values:
      - B3LYP
      - PBE
      - PBE0
      - LDA
      - BLYP
      - TPSS
      - SCAN
      - HSE06
    _shared_param: functionals

  - name: basis_set
    display_name: Basis Set
    kind: string
    default: "6-31G*"
    _shared_param: basis_sets

  - name: dispersion
    display_name: Dispersion Correction
    kind: enum
    default: "none"
    allowed_values:
      - "none"
      - D3
      - D3BJ
      - D4
    _shared_param: dispersions

  - name: population
    display_name: Population Analysis
    kind: enum
    default: Full
    allowed_values:
      - Full
      - None
      - Minimal

  - name: n_states
    display_name: Number of Excited States
    kind: integer
    default: 3
    min_value: 1
    max_value: 50
    description: "Number of excited states"

onboard_outputs:
  - name: scf_energy
    display_name: SCF Energy (Ha)
    kind: float
    unit: Ha

  - name: scf_converged
    display_name: SCF Converged
    kind: boolean
    quality_gate: true
    gate_default: must_pass
    gate_description: "SCF must converge."

resources:
  cpu_cores: 4
  mem_gb: 8.0
  mem_overhead: 2.0
  estimated_walltime_hours: 1.0
  scratch_disk_gb: 10.0
  parametrize:
    - cpu_cores
    - mem_gb
    - estimated_walltime_hours

execution:
  environment:
    GAUSS_SCRDIR: "/tmp"

semantic_identity: >-
  TD-DFT excited-state calculation using Gaussian 16.

distinguishing_ports:
  - fchk_file
  - total_energy
  - excitation_energies

rag_summary: ""
