# ===========================================================================
# orca-tddft — TD-DFT Excited-State Calculation
#
# 使用 ORCA 进行 TD-DFT 激发态计算。
# ===========================================================================

metadata:
  name: orca-tddft
  version: 1.0.0
  display_name: ORCA TD-DFT Excited-State Calculation
  description: >
    Performs a TD-DFT (time-dependent density functional theory) excited-state
    calculation using ORCA. Computes excitation energies and oscillator
    strengths for a specified number of excited states. Supports multiple
    functionals and dispersion corrections. Requires an XYZ geometry as
    stream input.
  node_type: compute
  category: chemistry
  author: MiQroForge Team
  semantic_type: single-point-energy
  base_image_ref: orca-6.1
  tags:
    software: orca
    version: "6.1"
    method:
      - TD-DFT
      - excited-state
      - single-point
    domain:
      - molecular
      - spectroscopy
    capabilities:
      - single-point-energy
      - population-analysis
      - excitation-energies
    keywords:
      - orca
      - tddft
      - excited-state
      - uv-vis
      - absorption
      - single-point

stream_inputs:
  - name: xyz_geometry
    display_name: Input Geometry (XYZ)
    io_type:
      category: physical_quantity
      unit: Ang
      shape: array
    required: true
    description: >
      Molecular geometry in standard XYZ format (Angstrom).
      Typically from geometry-file-input or another geometry source.

stream_outputs:
  - name: gbw_file
    display_name: GBW Wavefunction File
    io_type:
      category: software_data_package
      ecosystem: orca
      data_type: gbw-file
    description: ORCA binary wavefunction file (GBW). Used as input for subsequent calculations.

  - name: total_energy
    io_type:
      category: physical_quantity
      unit: Ha
    description: Total electronic energy at the given geometry.

  - name: mulliken_report
    display_name: Mulliken Population Report
    io_type:
      category: report_object
      format: json
      content_schema: '{"charges": [float], "spin_populations": [float], "atom_labels": [str]}'
      description: Mulliken population analysis results.
    description: JSON report of Mulliken charges and spin populations.

  - name: excitation_energies
    display_name: Excitation Energies
    io_type:
      category: report_object
      format: json
      content_schema: '{"states": [{"energy_eV": float, "energy_Ha": float, "oscillator_strength": float}]}'
      description: Excitation energies and oscillator strengths for each excited state.
    description: JSON report of TD-DFT excitation energies and oscillator strengths.

onboard_inputs:
  - name: charge
    display_name: Molecular Charge
    kind: integer
    default: 0

  - name: multiplicity
    display_name: Spin Multiplicity
    kind: integer
    default: 1
    min_value: 1

  - name: basis_set
    default: def2-SVP
    _shared_param: basis_sets

  - name: functional
    default: B3LYP
    _shared_param: functionals

  - name: dispersion
    default: "none"
    _shared_param: dispersions

  - name: n_states
    display_name: Number of Excited States
    kind: integer
    default: 3
    min_value: 1
    max_value: 50
    description: "Number of excited states to compute (nroots)."

onboard_outputs:
  - name: scf_energy
    display_name: SCF Energy (Ha)
    kind: float
    unit: Ha
    description: Final SCF energy.

  - name: scf_iterations
    display_name: SCF Iterations
    kind: integer
    description: Number of SCF cycles to convergence.

  - name: scf_converged
    display_name: SCF Converged
    kind: boolean
    description: Whether the SCF calculation converged successfully.
    quality_gate: true
    gate_default: must_pass
    gate_description: "SCF must converge for the energy to be meaningful."

resources:
  cpu_cores: 4
  mem_gb: 8.0
  estimated_walltime_hours: 1.0
  scratch_disk_gb: 10.0
  parallel_tasks: 4
  parametrize:
    - cpu_cores
    - parallel_tasks
    - estimated_walltime_hours

execution: {}

semantic_identity: >-
  TD-DFT excited-state calculation using ORCA.

distinguishing_ports:
  - gbw_file
  - total_energy
  - excitation_energies

rag_summary: ""
