# ===========================================================================
# orca-single-point — ORCA Single-Point Energy Calculation
#
# 使用 ORCA 进行单点能量计算（最基础的 ORCA 计算类型）。
# 适用场景：快速验证几何结构的能量，或为后续分析提供参考点。
# ===========================================================================

metadata:
  name: orca-single-point
  version: 1.0.0
  display_name: ORCA Single-Point Energy
  description: >
    Performs a single-point electronic energy calculation using ORCA.
    Computes the total energy at a fixed molecular geometry without geometry
    optimization. Supports DFT (B3LYP, PBE0, etc.) and wavefunction methods
    (HF, MP2, CCSD). Requires an XYZ geometry as on-board input.
  node_type: compute
  category: chemistry
  author: MiQroForge Team
  semantic_type: single-point-energy
  base_image_ref: orca-6.1
  tags:
    software: orca
    version: "6.1"
    method:
      - DFT
      - HF
      - MP2
      - single-point
    domain:
      - molecular
      - thermochemistry
    capabilities:
      - single-point-energy
      - population-analysis
    keywords:
      - orca
      - single-point
      - energy
      - dft
      - hf

stream_inputs:
  - name: xyz_geometry
    display_name: Input Geometry (XYZ)
    io_type:
      category: physical_quantity
      unit: Ang
      shape: array
    required: true
    description: >
      Molecular geometry in standard XYZ format (Angstrom).
      Typically from geometry-file-input or another geometry source.

stream_outputs:
  - name: gbw_file
    display_name: GBW Wavefunction File
    io_type:
      category: software_data_package
      ecosystem: orca
      data_type: gbw-file
    description: ORCA binary wavefunction file (GBW). Used as input for subsequent calculations.

  - name: total_energy
    io_type:
      category: physical_quantity
      unit: Ha
    description: Total electronic energy at the given geometry.

  - name: mulliken_report
    display_name: Mulliken Population Report
    io_type:
      category: report_object
      format: json
      content_schema: '{"charges": [float], "spin_populations": [float], "atom_labels": [str]}'
      description: Mulliken population analysis results.
    description: JSON report of Mulliken charges and spin populations.

onboard_inputs:
  - name: charge
    display_name: Molecular Charge
    kind: integer
    default: 0

  - name: multiplicity
    display_name: Spin Multiplicity
    kind: integer
    default: 1
    min_value: 1

  - name: method
    display_name: Electronic Structure Method
    kind: string
    default: B3LYP
    description: "ORCA method keyword, e.g. B3LYP, PBE0, HF, MP2, CCSD"

  - name: basis_set
    display_name: Basis Set
    kind: string
    default: def2-SVP
    description: "Basis set name, e.g. def2-SVP, def2-TZVP, 6-31G*"

  - name: dispersion
    display_name: Dispersion Correction
    kind: enum
    default: "none"
    allowed_values:
      - "none"
      - D3
      - D3BJ
      - D4

onboard_outputs:
  - name: scf_energy
    display_name: SCF Energy (Ha)
    kind: float
    unit: Ha
    description: Final SCF energy.

  - name: scf_iterations
    display_name: SCF Iterations
    kind: integer
    description: Number of SCF cycles to convergence.

  - name: scf_converged
    display_name: SCF Converged
    kind: boolean
    description: Whether the SCF calculation converged successfully.
    quality_gate: true
    gate_default: must_pass
    gate_description: "SCF must converge for the energy to be meaningful."

resources:
  cpu_cores: 4
  memory_gb: 8.0
  estimated_walltime_hours: 0.5
  scratch_disk_gb: 10.0
  parallel_tasks: 4
  resource_bindings:
    - cpu_cores
    - parallel_tasks

execution:
  environment:
    OMP_NUM_THREADS: "1"
    OMPI_ALLOW_RUN_AS_ROOT: "1"
    OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: "1"

semantic_identity: >-
  Single-point electronic energy calculation using ORCA quantum chemistry software.
  Produces a GBW wavefunction file, total energy, and Mulliken charges.

distinguishing_ports:
  - gbw_file
  - total_energy

rag_summary: ""
