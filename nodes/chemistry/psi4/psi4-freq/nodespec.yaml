# ===========================================================================
# psi4-freq — Psi4 Frequency Analysis
#
# 使用 Psi4 进行振动频率分析和热化学量计算。
# ===========================================================================

metadata:
  name: psi4-freq
  version: 1.0.0
  display_name: Psi4 Frequency Analysis
  description: >
    Performs harmonic vibrational frequency analysis using Psi4.
    Computes ZPE, enthalpy, Gibbs free energy, and checks for imaginary
    frequencies to confirm true minima.
  node_type: compute
  category: chemistry
  author: MiQroForge Team
  semantic_type: frequency-analysis
  base_image_ref: psi4-1.10
  tags:
    software: psi4
    version: "1.10"
    method:
      - DFT
      - HF
      - frequency
    domain:
      - molecular
      - thermochemistry
    capabilities:
      - frequency-analysis
      - thermochemistry
    keywords:
      - psi4
      - frequency
      - vibration
      - thermochemistry

stream_inputs:
  - name: xyz_geometry
    display_name: Input Geometry (XYZ)
    io_type:
      category: physical_quantity
      unit: Ang
      shape: array
    required: true
    description: >
      Molecular geometry in standard XYZ format (Angstrom).
      Should be a stationary point (optimized geometry).

stream_outputs:
  - name: zpe
    display_name: Zero-Point Energy
    io_type:
      category: physical_quantity
      unit: Ha
    description: Zero-point vibrational energy.

  - name: gibbs_free_energy
    display_name: Gibbs Free Energy
    io_type:
      category: physical_quantity
      unit: Ha
    description: Gibbs free energy at the specified temperature and pressure.

  - name: enthalpy
    display_name: Enthalpy
    io_type:
      category: physical_quantity
      unit: Ha
    description: Enthalpy (electronic + ZPE + thermal).

  - name: thermo_report
    display_name: Thermochemistry Report
    io_type:
      category: report_object
      format: json
    description: Complete thermochemistry results in JSON format.

onboard_inputs:
  - name: charge
    display_name: Molecular Charge
    kind: integer
    default: 0

  - name: multiplicity
    display_name: Spin Multiplicity
    kind: integer
    default: 1
    min_value: 1

  - name: method
    display_name: Electronic Structure Method
    kind: string
    default: B3LYP
    description: "Psi4 method keyword, e.g. B3LYP, PBE0, HF, MP2"

  - name: basis_set
    display_name: Basis Set
    kind: string
    default: cc-pVDZ
    description: "Basis set name, e.g. cc-pVDZ, cc-pVTZ, 6-31G*"

  - name: reference
    display_name: SCF Reference
    kind: enum
    default: rhf
    allowed_values:
      - rhf
      - uhf
      - rohf

  - name: scf_type
    display_name: SCF Algorithm
    kind: enum
    default: pk
    allowed_values:
      - pk
      - direct
      - df

  - name: temperature
    display_name: Temperature (K)
    kind: float
    default: 298.15
    min_value: 0.0
    max_value: 5000.0
    unit: K
    description: Temperature for thermochemical analysis.

  - name: pressure
    display_name: Pressure (atm)
    kind: float
    default: 1.0
    min_value: 0.0
    max_value: 1000.0
    unit: atm
    description: Pressure for thermochemical analysis.

onboard_outputs:
  - name: n_imaginary
    display_name: Number of Imaginary Frequencies
    kind: integer
    description: Count of imaginary frequencies. 0 = true minimum, 1 = transition state.

  - name: is_true_minimum
    display_name: Is True Minimum
    kind: boolean
    description: True if no imaginary frequencies found.
    quality_gate: true
    gate_default: must_pass
    gate_description: "Structure must be a true minimum (no imaginary frequencies)."

resources:
  cpu_cores: 4
  mem_gb: 4.0
  mem_overhead: 4.0
  estimated_walltime_hours: 1.0
  scratch_disk_gb: 10.0
  parallel_tasks: 4
  parametrize:
    - cpu_cores
    - parallel_tasks
    - mem_gb
    - estimated_walltime_hours

execution: {}

semantic_identity: >-
  Harmonic vibrational frequency analysis using Psi4.
  Produces ZPE, enthalpy, Gibbs free energy, and frequency data.

distinguishing_ports:
  - gibbs_free_energy
  - thermo_report

rag_summary: ""
