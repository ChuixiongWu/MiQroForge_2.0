# ===========================================================================
# psi4-dft — Psi4 DFT Single-Point
#
# 使用 Psi4 进行 DFT 单点能量计算，支持多种交换关联泛函和色散校正。
# ===========================================================================

metadata:
  name: psi4-dft
  version: 1.0.0
  display_name: Psi4 DFT Single-Point
  description: >
    Density functional theory single-point energy calculation using Psi4.
    Supports various exchange-correlation functionals and dispersion corrections.
  node_type: compute
  category: chemistry
  author: MiQroForge Team
  semantic_type: single-point-energy
  base_image_ref: psi4-1.10
  tags:
    software: psi4
    version: "1.10"
    method:
      - DFT
      - single-point
    domain:
      - molecular
      - thermochemistry
    capabilities:
      - single-point-energy
    keywords:
      - psi4
      - dft
      - functional
      - open-source

stream_inputs:
  - name: xyz_geometry
    display_name: Input Geometry (XYZ)
    io_type:
      category: physical_quantity
      unit: Ang
      shape: array
    required: true
    description: Molecular geometry in standard XYZ format (Angstrom).

stream_outputs:
  - name: total_energy
    display_name: Total Energy
    io_type:
      category: physical_quantity
      unit: Ha
    description: Total DFT electronic energy.

  - name: wavefunction_data
    display_name: Wavefunction Data
    io_type:
      category: software_data_package
      ecosystem: psi4
      data_type: wavefunction
    description: Psi4 wavefunction data (JSON serialized).

onboard_inputs:
  - name: charge
    display_name: Molecular Charge
    kind: integer
    default: 0

  - name: multiplicity
    display_name: Spin Multiplicity
    kind: integer
    default: 1
    min_value: 1

  - name: functional
    display_name: Exchange-Correlation Functional
    kind: enum
    default: B3LYP
    allowed_values:
      - B3LYP
      - PBE
      - PBE0
      - LDA
      - BLYP
      - TPSS
      - SCAN
      - HSE06
    _shared_param: functionals

  - name: basis_set
    display_name: Basis Set
    kind: string
    default: cc-pVDZ
    _shared_param: basis_sets

  - name: dispersion
    display_name: Dispersion Correction
    kind: enum
    default: "none"
    allowed_values:
      - "none"
      - D3
      - D3BJ
      - D4
    _shared_param: dispersions

  - name: reference
    display_name: SCF Reference
    kind: enum
    default: rhf
    allowed_values:
      - rhf
      - uhf
      - rohf

  - name: scf_type
    display_name: SCF Algorithm
    kind: enum
    default: pk
    allowed_values:
      - pk
      - direct
      - df

onboard_outputs:
  - name: scf_energy
    display_name: SCF Energy (Ha)
    kind: float
    unit: Ha

  - name: scf_iterations
    display_name: SCF Iterations
    kind: integer

  - name: scf_converged
    display_name: SCF Converged
    kind: boolean
    quality_gate: true
    gate_default: must_pass
    gate_description: "SCF must converge for the energy to be meaningful."

resources:
  cpu_cores: 4
  mem_gb: 4.0
  mem_overhead: 4.0
  estimated_walltime_hours: 0.5
  scratch_disk_gb: 10.0
  parallel_tasks: 4
  parametrize:
    - cpu_cores
    - parallel_tasks
    - mem_gb
    - estimated_walltime_hours

execution: {}

semantic_identity: >-
  DFT single-point energy calculation using Psi4.

distinguishing_ports:
  - total_energy

rag_summary: ""
